<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSakayMo - Join the Journey</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
       
        :root {
            --space-black: #050214;
            --nebula-purple: #1a0b35;
            --neon-violet: #7b2ff7;
            --accent-glow: #b066ff;
            --glass-white: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: linear-gradient(135deg, var(--space-black) 0%, var(--nebula-purple) 100%);
            font-family: 'Poppins', sans-serif; 
            margin: 0;
            overflow-x: hidden;
            color: white;
            min-height: 100vh;
        }

        .navbar { 
            background: rgba(5, 2, 20, 0.9) !important; 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(176, 102, 255, 0.2);
        }
        
        .navbar-brand-static { font-size: 1.25rem; font-weight: bold; display: flex; align-items: center; color: white !important;}
        .nav-link { color: rgba(255, 255, 255, 0.8) !important; transition: 0.3s; }
        .nav-link:hover { color: var(--accent-glow) !important; }

        .nav-link-disabled { opacity: 0.4; pointer-events: none; user-select: none; }

        .registration-card {
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(176, 102, 255, 0.2);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }

        .form-label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-glow); margin-bottom: 5px; }
        
        .form-control {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(176, 102, 255, 0.3) !important;
            color: white !important;
            border-radius: 12px;
            padding: 12px;
            transition: 0.3s;
        }

        .form-control:focus {
            box-shadow: 0 0 15px rgba(123, 47, 247, 0.4);
            border-color: var(--accent-glow) !important;
        }

        .btn-purple { 
            background: linear-gradient(45deg, var(--neon-violet), var(--accent-glow));
            color: white; 
            border-radius: 50px; 
            padding: 12px 25px; 
            border: none; 
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(123, 47, 247, 0.4);
            width: 100%;
        }
        .btn-purple:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px rgba(176, 102, 255, 0.6); 
            color: white; 
        }

        .hero-wrapper {
            position: relative;
            background-color: #ffffff; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            padding: 100px 0;
        }

        .wave-decoration {
            position: absolute;
            top: 0;
            right: -5%;
            width: 70%;
            height: 100%;
            background: linear-gradient(135deg, var(--nebula-purple) 0%, var(--space-black) 100%);
            border-radius: 50% 0% 0% 50% / 40% 0% 0% 60%; 
            z-index: 1;
            box-shadow: -15px 0 40px rgba(0,0,0,0.6);
        }

        .welcome-content { position: relative; z-index: 2; color: var(--space-black); }

        .profile-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #f8f9fa;
            border: 4px solid var(--accent-glow);
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.4s ease;
        }

        .profile-preview img { width: 100%; height: auto; }

        .pic-hidden {
            opacity: 0;
            transform: scale(0.5);
            visibility: hidden;
            height: 0;
            margin-bottom: 0;
        }

        .form-check-input:checked {
            background-color: var(--neon-violet);
            border-color: var(--accent-glow);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <div class="navbar-brand-static">
                <img src="https://cdn-icons-png.flaticon.com/512/719/719711.png" width="30" class="me-2" style="filter: hue-rotate(250deg);"> eSakayMo
            </div>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
         <li class="nav-item"><a class="nav-link" href="Q3 Project (Main Page.html).html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="Q3 Project (Main Page.html).html">Fare Matrix</a></li>
         <li class="nav-item"><span class="nav-link-disabled px-3">Schedule</span></li>
         <li class="nav-item"><span class="nav-link-disabled px-3">Help</span></li>
         <li class="nav-item ms-lg-3"><a href="Q3 Project (Main Page.html).html" class="btn btn-outline-light btn-sm rounded-pill px-4">Exit</a></li>
</ul>
            </div>
        </div>
    </nav>

    <section class="hero-wrapper">
        <div class="wave-decoration shadow-lg"></div>
        <div class="container">
            <div class="row align-items-center">
                
                <div class="col-lg-5 welcome-content pe-lg-5">
                    <h1 class="display-4 fw-bold mb-4">Create your <br><span style="color: var(--neon-violet);">Space Account</span></h1>
                    <p class="lead mb-4">Join eSakayMo today for faster MRT-3 fare calculations and personalized travel history.</p>
                    
                    <div class="profile-section">
                        <div id="pfpContainer" class="profile-preview">
                            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Avatar">
                        </div>
                        
                        <div class="form-check form-switch d-inline-block">
                            <input class="form-check-input" type="checkbox" id="togglePFP" checked>
                            <label class="form-check-label fw-bold text-dark ms-2" for="togglePFP">Show Profile Picture</label>
                        </div>
                    </div>
                </div>

                <div class="col-lg-7">
                    <div class="registration-card">
                        <h3 class="fw-bold mb-4" style="color: white; border-bottom: 2px solid var(--neon-violet); display: inline-block;">REGISTRATION</h3>
                        
                     <form action="Q3 Project (Confirmation Page).html">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">First Name</label>
                                    <input type="text" class="form-control" placeholder="Enter first name" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Last Name</label>
                                    <input type="text" class="form-control" placeholder="Enter last name" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Age</label>
                                    <input type="number" class="form-control" placeholder="Age" required>
                                </div>
                                <div class="col-md-8">
                                    <label class="form-label">Contact Number</label>
                                    <input type="tel" class="form-control" placeholder="+63 9xx xxxx xxx" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Email Address</label>
                                    <input type="email" class="form-control" placeholder="example@email.com" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Username</label>
                                    <input type="text" class="form-control" placeholder="Choose username" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Password</label>
                                    <input type="password" class="form-control" placeholder="••••••••" required>
                                </div>
                                <div class="col-12 mt-4">
                                    <button type="submit" class="btn-purple">Create Account</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </section>
    
    <footer class="text-center py-4 text-white opacity-50" style="position: relative; z-index: 10;">
        <p class="mb-0">Aeris Bandong & Caitlyn Tano | Grade 9 Section © 2026</p>
    </footer>

    <script>
        const toggleBtn = document.getElementById('togglePFP');
        const pfpContainer = document.getElementById('pfpContainer');

        toggleBtn.addEventListener('change', function() {
            if (this.checked) {
                pfpContainer.classList.remove('pic-hidden');
            } else {
                pfpContainer.classList.add('pic-hidden');
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
