<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSakayMo - Account Created</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --space-black: #050214;
            --nebula-purple: #1a0b35;
            --neon-violet: #7b2ff7;
            --accent-glow: #b066ff;
        }

        body { 
            background: linear-gradient(135deg, var(--space-black) 0%, var(--nebula-purple) 100%);
            font-family: 'Poppins', sans-serif; 
            margin: 0;
            overflow-x: hidden;
            color: white;
            min-height: 100vh;
        }

        .navbar { 
            background: rgba(5, 2, 20, 0.9) !important; 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(176, 102, 255, 0.2);
        }
        
        .navbar-brand-static { font-size: 1.25rem; font-weight: bold; display: flex; align-items: center; color: white !important;}
        .nav-link { color: rgba(255, 255, 255, 0.8) !important; transition: 0.3s; }
        .nav-link:hover { color: var(--accent-glow) !important; }
        .nav-link-disabled { opacity: 0.4; pointer-events: none; user-select: none; }

        .hero-wrapper {
            position: relative;
            background-color: #ffffff; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            padding: 100px 0;
        }

        .wave-decoration {
            position: absolute;
            top: 0;
            right: -5%;
            width: 70%;
            height: 100%;
            background: linear-gradient(135deg, var(--nebula-purple) 0%, var(--space-black) 100%);
            border-radius: 50% 0% 0% 50% / 40% 0% 0% 60%; 
            z-index: 1;
            box-shadow: -15px 0 40px rgba(0,0,0,0.6);
        }

        .welcome-content { position: relative; z-index: 2; color: var(--space-black); }

        .btn-purple { 
            background: linear-gradient(45deg, var(--neon-violet), var(--accent-glow));
            color: white; 
            border-radius: 50px; 
            padding: 12px 35px; 
            border: none; 
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(123, 47, 247, 0.4);
            text-decoration: none;
            display: inline-block;
        }
        .btn-purple:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px rgba(176, 102, 255, 0.6); 
            color: white; 
        }

        .hero-img-container {
            position: relative;
            z-index: 5; 
            text-align: center;
        }

        .hero-img-container img {
            max-width: 400px;
            width: 100%;     
            height: auto;
            border-radius: 50%; 
            padding: 15px;
            background-color: white;
            box-shadow: 0 15px 45px rgba(123, 47, 247, 0.3);
        }
    </style>
</head>
<body>
    
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <div class="navbar-brand-static">
            <img src="https://cdn-icons-png.flaticon.com/512/719/719711.png" width="30" class="me-2" style="filter: hue-rotate(250deg);"> eSakayMo
        </div>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="Q3 Project (Main Page.html).html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="Q3 Project (Main Page.html).html#fare-matrix">Fare Matrix</a></li>
                <li class="nav-item"><span class="nav-link-disabled px-3">Schedule</span></li>
                <li class="nav-item"><span class="nav-link-disabled px-3">Help</span></li>
                <li class="nav-item ms-lg-3"><a href="Q3 Project (Main Page.html).html" class="btn btn-outline-light btn-sm rounded-pill px-4">Exit</a></li>
            </ul>
        </div>
    </div>
</nav>

<form action="Q3 Project (Confirmation Page).html">

    <section class="hero-wrapper">
        <div class="wave-decoration shadow-lg"></div>
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6 welcome-content">
                    <h1 class="display-4 fw-bold mb-4">Your <span style="color: var(--neon-violet);">eSakayMo!</span> <br>account is now created</h1>
                    <p class="lead mb-4">Check your inbox and click the link to verify your email address. Welcome to the journey!</p>
                    <a href="https://mail.google.com/mail/u/0/#inbox" target="_blank" class="btn-purple">Open Gmail Inbox</a>
                </div>

                <div class="col-lg-6">
                    <div class="hero-img-container">
                        <img src="https://i.imgur.com/V5S1m1Q.png" alt="Success MRT">
                    </div>
                </div>
            </div>
        </div>
    </section>
    
    <footer class="text-center py-4 text-white opacity-50" style="position: relative; z-index: 10;">
        <p class="mb-0">Aeris Bandong & Caitlyn Tano | Grade 9 Section © 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
